<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0002 Cut Plane Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside id="info-panel">
            <h2>Info Panel</h2>
            <div id="stats-content">Loading...</div>
        </aside>

        <main id="viewport">
            <div id="stage" data-view="isometric"></div>
        </main>

        <nav id="observer-controls" aria-label="Observer axis display controls">
            <button data-view="isometric" class="active">isometric</button>
            <button data-view="front">front</button>
            <button data-view="top">top</button>
            <button data-view="side">side</button>
        </nav>
    </div>
    <script src="main.js"></script>
</body>
</html>
